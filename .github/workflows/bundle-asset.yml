name: Bundle assets

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Renaming file(s)
        run: cp entrypoint.sh cs-checker.sh
      - name: create zip for application files
        uses: vimtor/action-zip@v1.3
        with:
          files: common/ app/
          dest: app-codesystem.zip
      - name: create zip for libraries files
        uses: vimtor/action-zip@v1.3
        with:
          files: common/ lib/ 
          dest: lib-codesystem.zip
      - name: create zip for codesystem-checker
        uses: vimtor/action-zip@v1.3
        with:
          files: cs-checker.sh
          dest: codesystem-checker.zip
      - name: Get tag
        id: get_tag
        run: |
          sed -n 's/^## //p' CHANGELOG.md | head -n 1 > TAG
          echo "RELEASE_TAG=$(cat TAG)" >> $GITHUB_ENV
      - name: Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: "${{ env.RELEASE_TAG }}"
          prerelease: false
          draft: false
          files: |
            ${{ github.workspace }}/codesystem-checker.zip
            ${{ github.workspace }}/app-codesystem.zip
            ${{ github.workspace }}/lib-codesystem.zip
          body_path: CHANGELOG.md
