# GolangCI-lint configuration by CODESYSTEM. use and share, Enjoy!
version: 2

output:
  format:
    tab:
      path: stdout
      color: true
      print-issued-lines: true
      print-linter-name: true

issues:
  uniq-by-line: true

formatters:
  enable:
    - gci
    - gofmt
    - goimports

  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - example$

linters:
  default: none
  enable:
    - asciicheck
    - bodyclose
    - containedctx
    - contextcheck
    - copyloopvar
    - decorder
    - dupl
    - embeddedstructfieldcheck
    - err113
    - errcheck
    - exhaustive
    - forbidigo
    - funcorder
    - funlen
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - godox
    - gomoddirectives
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - lll
    - mnd
    - misspell
    - nestif
    - nilerr
    - nilnil
    - nlreturn
    - noctx
    - nolintlint
    - nonamedreturns
    - prealloc
    - staticcheck
    - revive
    - rowserrcheck
    - thelper
    - testifylint
    - unparam
    - unused
    - whitespace

settings:
  decorder:
    dec-order:
      - const
      - var
      - type
      - func
    errcheck:
      check-blank: true
    exhaustive:
      check:
        - switch
      forbidigo:
        forbid:
          - pattern: ^fmt.Print.*$
            msg: using fmt.Print** forbidden
      funcorder:
        constructor: true
        struct-method: true
        alphabetical: true
      funlen:
        lines: 80
        statements: 42
      gocognit:
        min-complexity: 12
      goconst:
        min-len: 2
        min-occurrences: 2
        ignore-tests: true
      gocyclo:
        min-complexity: 12
      godox:
        keywords:
          - NOTE
          - TODO
          - FIXME
      gosimple:
        checks: ["all"]
      gocritic:
        enable-all: true
      govet:
        check-shadowing: true
        settings:
          shadow:
            strict: true
        enable-all: true
        disable:
          - fieldalignment
      lll:
        line-length: 120
        tab-width: 1
      nolintlint:
        require-explanation: true
        require-specific: true
      staticcheck:
        checks: ["all"]
      testify:
        enable-all: true

  exclusions:
    generate: lax
    rules:
      - path: "_test.go"
        linters:
          - noctx
          - dupl
          - bodyclose
      - source: "t.Run"
        linters:
          - goconst
      - source: "^//go:generate"
        linters:
          - lll
