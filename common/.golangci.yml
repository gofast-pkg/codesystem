# GolangCI-lint configuration by CODESYSTEM. use and share, Enjoy!
version: "2"

output:
  formats:
    tab:
      path: stdout
      colors: true
      print-linter-name: true

issues:
  uniq-by-line: true

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
    - golines
    - swaggo
  exclusions:
    generated: strict
    paths:
      - mocks
      - example

linters:
  default: none
  enable:
    - asciicheck
    - bodyclose
    - containedctx
    - contextcheck
    - copyloopvar
    - decorder
    - dupl
    - embeddedstructfieldcheck
    - err113
    - errcheck
    - exhaustive
    - forbidigo
    - funcorder
    - funlen
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - godox
    - gomoddirectives
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - lll
    - mnd
    - misspell
    - nestif
    - nilerr
    - nilnil
    - nlreturn
    - noctx
    - nolintlint
    - nonamedreturns
    - prealloc
    - staticcheck
    - revive
    - rowserrcheck
    - thelper
    - testifylint
    - unparam
    - unused
    - whitespace

  exclusions:
    generated: strict
    rules:
      - path: '(.+)_test\.go'
        linters:
          - noctx
          - dupl
          - bodyclose
          - funlen
          - gocognit
          - gocyclo
      - source: "t.Run"
        linters:
          - goconst
      - source: "^//go:generate"
        linters:
          - lll

  settings:
    decorder:
      dec-order:
        - const
        - var
        - type
        - func
    errcheck:
      check-blank: true
    exhaustive:
      check:
        - switch
    funlen:
      lines: 80
      statements: 42
    gocognit:
      min-complexity: 12
    gocyclo:
      min-complexity: 12
    goconst:
      min-len: 2
      min-occurrences: 2
      find-duplicates: true
    godox:
      keywords:
        - NOTE
        - TODO
        - FIXME
    lll:
      line-length: 120
      tab-width: 4
    nolintlint:
      require-explanation: true
      require-specific: true
    forbidigo:
      forbid:
        - pattern: ^fmt.Print.*$
          msg: "using fmt.Print** forbidden"
    funcorder:
      constructor: true
      struct-method: true
      alphabetical: true
    gocritic:
      enable-all: true
      disabled-checks:
        - sloppyReassign
    govet:
      enable-all: true
      settings:
        shadow:
          strict: true
      disable:
        - fieldalignment
    staticcheck:
      checks: ["all"]
    testifylint:
      enable-all: true
