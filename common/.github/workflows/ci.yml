name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: './go.mod'
        check-latest: true
    
    - name: Install
      run: |
        make dep
        make ci-tool

    - name: Tests
      run: make tests

    - name: Lints
      run: make lint

    - name: Build
      run: make build

    - name: Coverage
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        directory: .ignore/
        files: coverage.txt
        fail_ci_if_error: true
        flags: unit-testing
        name: codecov-umbrella
        verbose: true
